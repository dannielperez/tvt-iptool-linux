name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends meson ninja-build libgtk-4-dev desktop-file-utils appstream
      - name: Configure
        run: meson setup build
      - name: Build
        run: meson compile -C build
      - name: Test
        run: meson test -C build --print-errorlogs
      - name: Validate desktop metadata
        run: |
          desktop-file-validate data/io.github.dannielperez.tvt-iptool.desktop
          appstreamcli validate --no-net data/io.github.dannielperez.tvt-iptool.metainfo.xml
      - name: Verify install layout
        run: DESTDIR="$PWD/stage" meson install -C build && test -x stage/usr/local/bin/tvt-iptool
